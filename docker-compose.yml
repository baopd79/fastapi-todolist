name: fastapi-todolist

services:
  postgres:
    image: postgres:17-alpine
    container_name: todolist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - todolist-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: todolist-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override host to use docker network service name
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todolist-net
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock

volumes:
  postgres_data:
    name: todolist-postgres-data

networks:
  todolist-net:
    name: todolist-net
    driver: bridge